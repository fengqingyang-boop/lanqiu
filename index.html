<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D篮球游戏</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Microsoft YaHei', Arial, sans-serif;
        }

        #app {
            width: 100%;
            height: 100%;
            position: relative;
        }

        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .instructions {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 30px;
            border-radius: 10px;
            color: white;
            text-align: center;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .instructions h3 {
            margin-bottom: 10px;
            font-size: 18px;
            color: #ff8c42;
        }

        .instructions p {
            font-size: 14px;
            line-height: 1.8;
            opacity: 0.95;
        }

        .status-bar {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 20px;
            border-radius: 10px;
            color: white;
            z-index: 100;
            backdrop-filter: blur(10px);
            min-width: 160px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .status-bar h4 {
            margin-bottom: 10px;
            color: #ff8c42;
            font-size: 15px;
        }

        .status-bar p {
            font-size: 13px;
            margin: 8px 0;
        }

        .status-bar .value {
            color: #4ade80;
            font-weight: bold;
            font-size: 16px;
        }

        .zoom-indicator {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 24px;
            border-radius: 20px;
            color: white;
            font-size: 13px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .zoom-bar {
            width: 150px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            margin-top: 8px;
            overflow: hidden;
        }

        .zoom-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff8c42, #e65100);
            border-radius: 3px;
            transition: width 0.1s ease;
        }

        .game-over-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(15px);
        }

        .game-over-panel {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border: 2px solid #ff8c42;
            border-radius: 20px;
            padding: 50px 60px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 140, 66, 0.3);
            animation: panel-appear 0.5s ease-out;
        }

        @keyframes panel-appear {
            0% {
                transform: scale(0.5) translateY(30px);
                opacity: 0;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .game-over-panel h2 {
            color: #ff8c42;
            font-size: 32px;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .game-over-panel .stats {
            margin-bottom: 30px;
        }

        .game-over-panel .stat-item {
            margin: 20px 0;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .game-over-panel .stat-item p:first-child {
            color: #a0a0a0;
            font-size: 13px;
            margin-bottom: 5px;
        }

        .game-over-panel .stat-item p:last-child {
            color: #4ade80;
            font-size: 26px;
            font-weight: bold;
        }

        .restart-btn {
            background: linear-gradient(135deg, #ff8c42 0%, #e65100 100%);
            color: white;
            border: none;
            padding: 15px 45px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255, 140, 66, 0.3);
        }

        .restart-btn:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(255, 140, 66, 0.4);
        }

        .restart-btn:active {
            transform: translateY(-1px) scale(1.02);
        }
    </style>
</head>
<body>
    <div id="app">
        <canvas id="game-canvas"></canvas>
        
        <div class="instructions">
            <h3>游戏说明</h3>
            <p>🖱️ 按住左键拖动：旋转3D篮球</p>
            <p>🔄 鼠标滚轮：拉近/拉远视野</p>
            <p>⌨️ 空格键：自由落体开始游戏</p>
        </div>

        <div class="status-bar">
            <h4>游戏状态</h4>
            <p>状态: <span class="value">{{ gameStatusText }}</span></p>
            <p v-if="isFalling || isGameOver">弹跳次数: <span class="value">{{ bounceCount }}</span></p>
            <p v-if="isFalling || isGameOver">游戏时间: <span class="value">{{ gameTime.toFixed(2) }}秒</span></p>
        </div>

        <div class="zoom-indicator">
            视野: {{ Math.round(zoomPercent) }}%
            <div class="zoom-bar">
                <div class="zoom-bar-fill" :style="{ width: zoomPercent + '%' }"></div>
            </div>
        </div>

        <div class="game-over-overlay" v-if="isGameOver">
            <div class="game-over-panel">
                <h2>游戏结束</h2>
                <div class="stats">
                    <div class="stat-item">
                        <p>篮球弹跳次数</p>
                        <p>{{ finalBounceCount }} 次</p>
                    </div>
                    <div class="stat-item">
                        <p>从落下到静止的时间</p>
                        <p>{{ finalGameTime.toFixed(2) }} 秒</p>
                    </div>
                </div>
                <button class="restart-btn" @click="restartGame">
                    重新开始
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, onUnmounted, watch, nextTick } = Vue;

        createApp({
            setup() {
                const GAME_STATE = {
                    IDLE: 'idle',
                    DRAGGING: 'dragging',
                    FALLING: 'falling',
                    GAME_OVER: 'game_over'
                };

                const BALL_RADIUS = 2;
                const GRAVITY = -15;
                const BOUNCE_COEFFICIENT = 0.7;
                const AIR_RESISTANCE = 0.999;
                const GROUND_FRICTION = 0.95;
                const REST_VELOCITY_THRESHOLD = 0.5;
                const REST_TIME_THRESHOLD = 1500;
                const MIN_BOUNCE_INTERVAL = 50;

                const gameState = ref(GAME_STATE.IDLE);
                const isDragging = ref(false);
                const isFalling = ref(false);
                const isGameOver = ref(false);

                const bounceCount = ref(0);
                const finalBounceCount = ref(0);
                const gameTime = ref(0);
                const finalGameTime = ref(0);

                const cameraDistance = ref(12);
                const MIN_CAMERA_DISTANCE = 6;
                const MAX_CAMERA_DISTANCE = 25;

                const lastMouseX = ref(0);
                const lastMouseY = ref(0);
                const isMouseDown = ref(false);

                let scene = null;
                let camera = null;
                let renderer = null;
                let basketball = null;
                let ground = null;
                let ambientLight = null;
                let directionalLight = null;
                let spotLight = null;

                let position = { x: 0, y: 5, z: 0 };
                let velocity = { x: 0, y: 0, z: 0 };
                let angularVelocity = { x: 0, y: 0, z: 0 };

                let gameLoop = null;
                let startTime = 0;
                let lastFrameTime = 0;
                let lastBounceTime = 0;
                let restStartTime = null;
                let isOnGround = false;

                const targetRotation = { x: 0, y: 0 };
                const currentRotation = { x: 0, y: 0 };

                const gameStatusText = computed(() => {
                    switch (gameState.value) {
                        case GAME_STATE.IDLE: return '等待开始';
                        case GAME_STATE.DRAGGING: return '旋转中';
                        case GAME_STATE.FALLING: return '游戏中';
                        case GAME_STATE.GAME_OVER: return '已结束';
                        default: return '未知';
                    }
                });

                const zoomPercent = computed(() => {
                    return ((MAX_CAMERA_DISTANCE - cameraDistance.value) / (MAX_CAMERA_DISTANCE - MIN_CAMERA_DISTANCE)) * 100;
                });

                function createBasketballTexture() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 1024;
                    canvas.height = 512;
                    const ctx = canvas.getContext('2d');

                    ctx.fillStyle = '#e65100';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    const gradient = ctx.createRadialGradient(
                        canvas.width * 0.3, canvas.height * 0.3, 0,
                        canvas.width * 0.3, canvas.height * 0.3, canvas.width * 0.4
                    );
                    gradient.addColorStop(0, '#ff8c42');
                    gradient.addColorStop(0.5, '#e65100');
                    gradient.addColorStop(1, '#8b1d00');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    ctx.strokeStyle = 'rgba(0, 0, 0, 0.4)';
                    ctx.lineWidth = 8;

                    ctx.beginPath();
                    ctx.moveTo(0, canvas.height / 2);
                    ctx.lineTo(canvas.width, canvas.height / 2);
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(canvas.width / 2, 0);
                    ctx.lineTo(canvas.width / 2, canvas.height);
                    ctx.stroke();

                    ctx.lineWidth = 6;
                    const curveOffset = canvas.width * 0.15;
                    
                    ctx.beginPath();
                    ctx.moveTo(curveOffset, 0);
                    ctx.bezierCurveTo(
                        curveOffset + 50, canvas.height * 0.25,
                        curveOffset + 50, canvas.height * 0.75,
                        curveOffset, canvas.height
                    );
                    ctx.stroke();

                    ctx.beginPath();
                    ctx.moveTo(canvas.width - curveOffset, 0);
                    ctx.bezierCurveTo(
                        canvas.width - curveOffset - 50, canvas.height * 0.25,
                        canvas.width - curveOffset - 50, canvas.height * 0.75,
                        canvas.width - curveOffset, canvas.height
                    );
                    ctx.stroke();

                    for (let i = 0; i < 50; i++) {
                        const x = Math.random() * canvas.width;
                        const y = Math.random() * canvas.height;
                        const size = Math.random() * 20 + 5;
                        ctx.beginPath();
                        ctx.arc(x, y, size, 0, Math.PI * 2);
                        ctx.fillStyle = `rgba(139, 29, 0, ${Math.random() * 0.2})`;
                        ctx.fill();
                    }

                    const highlightGradient = ctx.createRadialGradient(
                        canvas.width * 0.25, canvas.height * 0.25, 0,
                        canvas.width * 0.25, canvas.height * 0.25, canvas.width * 0.2
                    );
                    highlightGradient.addColorStop(0, 'rgba(255, 255, 255, 0.3)');
                    highlightGradient.addColorStop(1, 'rgba(255, 255, 255, 0)');
                    ctx.fillStyle = highlightGradient;
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    return new THREE.CanvasTexture(canvas);
                }

                function initScene() {
                    const canvas = document.getElementById('game-canvas');
                    
                    scene = new THREE.Scene();
                    
                    const bgCanvas = document.createElement('canvas');
                    bgCanvas.width = 2;
                    bgCanvas.height = 512;
                    const bgCtx = bgCanvas.getContext('2d');
                    const bgGradient = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
                    bgGradient.addColorStop(0, '#1a1a2e');
                    bgGradient.addColorStop(0.5, '#16213e');
                    bgGradient.addColorStop(1, '#0f3460');
                    bgCtx.fillStyle = bgGradient;
                    bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
                    scene.background = new THREE.CanvasTexture(bgCanvas);

                    camera = new THREE.PerspectiveCamera(
                        60,
                        window.innerWidth / window.innerHeight,
                        0.1,
                        1000
                    );
                    camera.position.set(0, 2, cameraDistance.value);
                    camera.lookAt(0, 2, 0);

                    renderer = new THREE.WebGLRenderer({
                        canvas: canvas,
                        antialias: true,
                        alpha: true
                    });
                    renderer.setSize(window.innerWidth, window.innerHeight);
                    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
                    renderer.shadowMap.enabled = true;
                    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

                    ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
                    scene.add(ambientLight);

                    directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
                    directionalLight.position.set(5, 10, 5);
                    directionalLight.castShadow = true;
                    directionalLight.shadow.mapSize.width = 2048;
                    directionalLight.shadow.mapSize.height = 2048;
                    directionalLight.shadow.camera.near = 0.5;
                    directionalLight.shadow.camera.far = 50;
                    directionalLight.shadow.camera.left = -15;
                    directionalLight.shadow.camera.right = 15;
                    directionalLight.shadow.camera.top = 15;
                    directionalLight.shadow.camera.bottom = -15;
                    scene.add(directionalLight);

                    spotLight = new THREE.SpotLight(0xffaa66, 0.6);
                    spotLight.position.set(-5, 8, 3);
                    spotLight.angle = Math.PI / 6;
                    spotLight.penumbra = 0.3;
                    spotLight.castShadow = true;
                    scene.add(spotLight);

                    const ballGeometry = new THREE.SphereGeometry(BALL_RADIUS, 64, 64);
                    const ballTexture = createBasketballTexture();
                    ballTexture.wrapS = THREE.RepeatWrapping;
                    ballTexture.wrapT = THREE.RepeatWrapping;

                    const ballMaterial = new THREE.MeshStandardMaterial({
                        map: ballTexture,
                        roughness: 0.7,
                        metalness: 0.1,
                        bumpMap: ballTexture,
                        bumpScale: 0.02
                    });

                    basketball = new THREE.Mesh(ballGeometry, ballMaterial);
                    basketball.position.set(position.x, position.y, position.z);
                    basketball.castShadow = true;
                    basketball.receiveShadow = true;
                    scene.add(basketball);

                    const groundGeometry = new THREE.PlaneGeometry(50, 50);
                    const groundMaterial = new THREE.MeshStandardMaterial({
                        color: 0x2d5016,
                        roughness: 0.9,
                        metalness: 0
                    });

                    ground = new THREE.Mesh(groundGeometry, groundMaterial);
                    ground.rotation.x = -Math.PI / 2;
                    ground.position.y = -BALL_RADIUS;
                    ground.receiveShadow = true;
                    scene.add(ground);

                    const gridHelper = new THREE.GridHelper(50, 50, 0x3a6b1f, 0x2a5a1f);
                    gridHelper.position.y = -BALL_RADIUS + 0.01;
                    scene.add(gridHelper);

                    animateIdle();
                }

                function animateIdle() {
                    function animate() {
                        if (gameState.value === GAME_STATE.IDLE || gameState.value === GAME_STATE.DRAGGING) {
                            const smoothing = 0.1;
                            currentRotation.x += (targetRotation.x - currentRotation.x) * smoothing;
                            currentRotation.y += (targetRotation.y - currentRotation.y) * smoothing;

                            basketball.rotation.x = currentRotation.x;
                            basketball.rotation.y = currentRotation.y;

                            if (gameState.value === GAME_STATE.IDLE) {
                                basketball.position.y = 5 + Math.sin(Date.now() * 0.002) * 0.2;
                            }

                            updateCameraPosition();
                            renderer.render(scene, camera);
                        }
                        gameLoop = requestAnimationFrame(animate);
                    }
                    animate();
                }

                function updateCameraPosition() {
                    camera.position.x = Math.sin(currentRotation.y * 0.3) * cameraDistance.value * 0.1;
                    camera.position.z = cameraDistance.value;
                    camera.position.y = 2 + currentRotation.x * 0.5;
                    camera.lookAt(basketball.position);
                }

                function handleMouseDown(e) {
                    if (gameState.value !== GAME_STATE.IDLE && gameState.value !== GAME_STATE.DRAGGING) {
                        return;
                    }
                    
                    isMouseDown.value = true;
                    isDragging.value = true;
                    gameState.value = GAME_STATE.DRAGGING;
                    lastMouseX.value = e.clientX;
                    lastMouseY.value = e.clientY;
                }

                function handleMouseMove(e) {
                    if (!isMouseDown.value) return;

                    const deltaX = e.clientX - lastMouseX.value;
                    const deltaY = e.clientY - lastMouseY.value;

                    targetRotation.y += deltaX * 0.01;
                    targetRotation.x += deltaY * 0.01;

                    targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));

                    angularVelocity.y = deltaX * 0.5;
                    angularVelocity.x = deltaY * 0.5;

                    lastMouseX.value = e.clientX;
                    lastMouseY.value = e.clientY;
                }

                function handleMouseUp() {
                    isMouseDown.value = false;
                    isDragging.value = false;
                    if (gameState.value === GAME_STATE.DRAGGING) {
                        gameState.value = GAME_STATE.IDLE;
                    }
                }

                function handleWheel(e) {
                    e.preventDefault();
                    if (gameState.value === GAME_STATE.FALLING || gameState.value === GAME_STATE.GAME_OVER) {
                        return;
                    }

                    const delta = e.deltaY > 0 ? 1 : -1;
                    cameraDistance.value = Math.max(
                        MIN_CAMERA_DISTANCE,
                        Math.min(MAX_CAMERA_DISTANCE, cameraDistance.value + delta * 0.8)
                    );
                }

                function handleKeydown(e) {
                    if (e.code === 'Space') {
                        e.preventDefault();
                        if (gameState.value === GAME_STATE.IDLE || gameState.value === GAME_STATE.DRAGGING) {
                            startFalling();
                        }
                    }
                }

                function handleResize() {
                    if (camera && renderer) {
                        camera.aspect = window.innerWidth / window.innerHeight;
                        camera.updateProjectionMatrix();
                        renderer.setSize(window.innerWidth, window.innerHeight);
                    }
                }

                function startFalling() {
                    if (gameLoop) {
                        cancelAnimationFrame(gameLoop);
                    }

                    gameState.value = GAME_STATE.FALLING;
                    isFalling.value = true;
                    
                    position = {
                        x: basketball.position.x,
                        y: basketball.position.y,
                        z: basketball.position.z
                    };
                    
                    velocity = {
                        x: angularVelocity.y * 0.1,
                        y: 0,
                        z: 0
                    };

                    bounceCount.value = 0;
                    gameTime.value = 0;
                    lastBounceTime = 0;
                    restStartTime = null;
                    isOnGround = false;
                    
                    startTime = performance.now();
                    lastFrameTime = startTime;
                    lastBounceTime = startTime;
                    
                    startPhysicsLoop();
                }

                function startPhysicsLoop() {
                    const fixedDt = 1 / 60;
                    let accumulator = 0;
                    
                    function update(currentTime) {
                        if (gameState.value !== GAME_STATE.FALLING) return;

                        const frameTime = Math.min((currentTime - lastFrameTime) / 1000, 0.05);
                        lastFrameTime = currentTime;

                        gameTime.value = (currentTime - startTime) / 1000;

                        accumulator += frameTime;
                        
                        while (accumulator >= fixedDt) {
                            velocity.y += GRAVITY * fixedDt;
                            velocity.x *= AIR_RESISTANCE;
                            velocity.y *= AIR_RESISTANCE;
                            velocity.z *= AIR_RESISTANCE;

                            position.x += velocity.x * fixedDt;
                            position.y += velocity.y * fixedDt;
                            position.z += velocity.z * fixedDt;

                            angularVelocity.x *= 0.995;
                            angularVelocity.y *= 0.995;
                            angularVelocity.z *= 0.995;

                            const groundY = -BALL_RADIUS;
                            
                            if (position.y <= groundY) {
                                position.y = groundY;

                                if (velocity.y < 0) {
                                    const bounceSpeed = Math.abs(velocity.y);
                                    
                                    if (bounceSpeed > REST_VELOCITY_THRESHOLD && 
                                        currentTime - lastBounceTime > MIN_BOUNCE_INTERVAL) {
                                        velocity.y = -velocity.y * BOUNCE_COEFFICIENT;
                                        velocity.x *= GROUND_FRICTION;
                                        velocity.z *= GROUND_FRICTION;
                                        
                                        const bounceRotFactor = 0.3;
                                        angularVelocity.x += velocity.x * bounceRotFactor;
                                        angularVelocity.z += velocity.z * bounceRotFactor;
                                        
                                        bounceCount.value++;
                                        lastBounceTime = currentTime;
                                        restStartTime = null;
                                        isOnGround = false;
                                    } else {
                                        if (!isOnGround) {
                                            isOnGround = true;
                                            restStartTime = currentTime;
                                        }
                                        
                                        velocity.y = 0;
                                        velocity.x *= 0.95;
                                        velocity.z *= 0.95;
                                        angularVelocity.x *= 0.9;
                                        angularVelocity.y *= 0.9;
                                        angularVelocity.z *= 0.9;
                                    }
                                }
                            } else {
                                isOnGround = false;
                            }

                            if (isOnGround && restStartTime !== null && 
                                currentTime - restStartTime > REST_TIME_THRESHOLD) {
                                const totalVelocity = Math.sqrt(
                                    velocity.x * velocity.x + 
                                    velocity.y * velocity.y + 
                                    velocity.z * velocity.z
                                );
                                const totalAngularVelocity = Math.sqrt(
                                    angularVelocity.x * angularVelocity.x + 
                                    angularVelocity.y * angularVelocity.y + 
                                    angularVelocity.z * angularVelocity.z
                                );
                                
                                if (totalVelocity < REST_VELOCITY_THRESHOLD * 0.3 && 
                                    totalAngularVelocity < 0.5) {
                                    endGame();
                                    return;
                                }
                            }

                            const boundary = 15;
                            if (Math.abs(position.x) > boundary) {
                                position.x = Math.sign(position.x) * boundary;
                                velocity.x = -velocity.x * BOUNCE_COEFFICIENT * 0.8;
                                angularVelocity.y = -angularVelocity.y * 0.8;
                            }
                            if (Math.abs(position.z) > boundary) {
                                position.z = Math.sign(position.z) * boundary;
                                velocity.z = -velocity.z * BOUNCE_COEFFICIENT * 0.8;
                                angularVelocity.x = -angularVelocity.x * 0.8;
                            }

                            accumulator -= fixedDt;
                        }

                        basketball.rotation.x += angularVelocity.x * fixedDt;
                        basketball.rotation.y += angularVelocity.y * fixedDt;
                        basketball.rotation.z += angularVelocity.z * fixedDt;

                        basketball.position.set(position.x, position.y, position.z);

                        updateCameraPosition();
                        renderer.render(scene, camera);

                        gameLoop = requestAnimationFrame(update);
                    }

                    gameLoop = requestAnimationFrame(update);
                }

                function endGame() {
                    if (gameLoop) {
                        cancelAnimationFrame(gameLoop);
                        gameLoop = null;
                    }

                    gameState.value = GAME_STATE.GAME_OVER;
                    isGameOver.value = true;
                    isFalling.value = false;
                    finalBounceCount.value = bounceCount.value;
                    finalGameTime.value = gameTime.value;

                    renderer.render(scene, camera);
                }

                function restartGame() {
                    if (gameLoop) {
                        cancelAnimationFrame(gameLoop);
                        gameLoop = null;
                    }

                    gameState.value = GAME_STATE.IDLE;
                    isFalling.value = false;
                    isGameOver.value = false;

                    position = { x: 0, y: 5, z: 0 };
                    velocity = { x: 0, y: 0, z: 0 };
                    angularVelocity = { x: 0, y: 0, z: 0 };

                    targetRotation.x = 0;
                    targetRotation.y = 0;
                    currentRotation.x = 0;
                    currentRotation.y = 0;

                    basketball.position.set(0, 5, 0);
                    basketball.rotation.set(0, 0, 0);

                    cameraDistance.value = 12;
                    updateCameraPosition();

                    bounceCount.value = 0;
                    finalBounceCount.value = 0;
                    gameTime.value = 0;
                    finalGameTime.value = 0;
                    lastBounceTime = 0;
                    restStartTime = null;
                    isOnGround = false;

                    nextTick(() => {
                        animateIdle();
                    });
                }

                onMounted(() => {
                    nextTick(() => {
                        initScene();
                        
                        window.addEventListener('keydown', handleKeydown);
                        window.addEventListener('wheel', handleWheel, { passive: false });
                        window.addEventListener('mousedown', handleMouseDown);
                        window.addEventListener('mousemove', handleMouseMove);
                        window.addEventListener('mouseup', handleMouseUp);
                        window.addEventListener('resize', handleResize);
                    });
                });

                onUnmounted(() => {
                    if (gameLoop) {
                        cancelAnimationFrame(gameLoop);
                    }
                    window.removeEventListener('keydown', handleKeydown);
                    window.removeEventListener('wheel', handleWheel);
                    window.removeEventListener('mousedown', handleMouseDown);
                    window.removeEventListener('mousemove', handleMouseMove);
                    window.removeEventListener('mouseup', handleMouseUp);
                    window.removeEventListener('resize', handleResize);
                });

                return {
                    isDragging,
                    isFalling,
                    isGameOver,
                    bounceCount,
                    finalBounceCount,
                    gameTime,
                    finalGameTime,
                    gameStatusText,
                    zoomPercent,
                    restartGame
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
